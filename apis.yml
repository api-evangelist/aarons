description: >-
  Aaron's is a lease-to-own retailer of furniture, consumer electronics, home appliances,
  and accessories serving customers across the United States and Canada. They provide
  flexible payment options including rent-to-own leasing with instant approval,
  online account management, and EZPay automatic payments.
